name: Robot Framework CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    # Nutné, aby peaceiris/actions-gh-pages mohl pushnout report do větve gh-pages
    permissions:
      contents: write

    steps:
      # 1. Stáhne kód z GitHubu do virtuálního stroje
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Nastaví pokročilý buildovací nástroj pro Docker (nutný pro cache)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Vytvoří dočasný .env soubor pro potřeby pipeline
      - name: Create .env file for CI
        run: |
          echo "BASE_URL=https://example.com" >> .env
          echo "EXPECTED_TITLE=Example Domain" >> .env

      # 4. Sestaví Docker image s využitím GitHub Actions Cache
      # Při prvním spuštění se image uloží do cache, při dalším se z ní bleskově vytáhne
      - name: Build Docker image with cache
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          tags: kwsoft-robot-tests:latest
          load: true # Načte sestavený image do lokálního Docker démona v pipeline
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 5. Spustí testy pomocí Docker Compose (bez příznaku --build, protože image už máme z cache)
      # --exit-code-from zajistí, že pokud testy selžou, celá pipeline zčervená
      - name: Prepare Results Directory
        run: |
          mkdir -p results
          chmod 777 results
          mkdir -p allure-results
          chmod 777 allure-results

      - name: Run Robot Framework Tests via Docker
        env:
          HEADLESS: "true"
          BASE_URL: "https://example.com"
        run: docker compose up --exit-code-from robot-tests

      # 5b. Zajistí, že větev gh-pages existuje (jinak peaceiris na prvním běhu spadne
      # na "src refspec gh-pages does not match any"). Idempotentní, izolovaný temp repo.
      - name: Ensure gh-pages branch exists
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            echo "gh-pages already exists"
          else
            echo "creating empty gh-pages branch"
            tmp="$(mktemp -d)"
            git -C "$tmp" init -q -b gh-pages
            git -C "$tmp" -c user.name=ci -c user.email=ci@users.noreply.github.com \
              commit -q --allow-empty -m "init gh-pages"
            git -C "$tmp" push -q \
              "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
          fi

      # 6. Natáhne předchozí historii Allure z větve gh-pages (kvůli trendům).
      # Na první běh větev ještě neexistuje -> continue-on-error.
      - name: Checkout gh-pages (Allure history)
        if: always()
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      # 7. Vygeneruje Allure report (action běží ve vlastním kontejneru -> v image netřeba Java/CLI).
      - name: Generate Allure report with history
        if: always()
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history

      # 8. Publikuje report na GitHub Pages (větev gh-pages).
      - name: Publish Allure report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      - name: Upload Test Results and Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-framework-results
          path: |
            results/
          if-no-files-found: warn
          retention-days: 7