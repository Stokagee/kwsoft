services:
  robot-tests:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./tests:/opt/robotframework/tests
      - ./resources:/opt/robotframework/resources
      - ./config:/opt/robotframework/config
      - ./results:/opt/robotframework/results
      - ./pabot-chromium.txt:/opt/robotframework/pabot-chromium.txt
      - ./pabot-firefox.txt:/opt/robotframework/pabot-firefox.txt
      - ./pabot-webkit.txt:/opt/robotframework/pabot-webkit.txt
    environment:
      # 1. Tady Docker přečte hodnoty z tvého lokálního .env (nebo z GitHub Actions env:)
      # Pokud neexistují, dosadí bezpečné defaulty za pomlčkou
      BASE_URL: ${BASE_URL:-https://example.com}
      EXPECTED_TITLE: ${EXPECTED_TITLE:-Example Domain}
      TIMEOUT: ${TIMEOUT:-10s}
      HEADLESS: ${HEADLESS:-true}
      LOG_TO_CONSOLE: ${LOG_TO_CONSOLE:-true}
    # 2. Tady ty hodnoty vezmeme a pomocí "--variable" je "vstříkneme" přímo do Robot Frameworku
    command: >
      pabot 
      --processes 3 
      --variable BASE_URL:${BASE_URL:-https://example.com} 
      --variable EXPECTED_TITLE:"${EXPECTED_TITLE:-Example Domain}" 
      --variable TIMEOUT:${TIMEOUT:-10s} 
      --variable HEADLESS:${HEADLESS:-true} 
      --variable LOG_TO_CONSOLE:${LOG_TO_CONSOLE:-true} 
      --argumentfile1 /opt/robotframework/pabot-chromium.txt 
      --argumentfile2 /opt/robotframework/pabot-firefox.txt 
      --argumentfile3 /opt/robotframework/pabot-webkit.txt 
      --outputdir /opt/robotframework/results 
      /opt/robotframework/tests